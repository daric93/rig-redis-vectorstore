version: 2
updates:
  # Rust dependencies — surfaces new rig-core (and other) releases as PRs that CI
  # then validates for compatibility.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Only change the version requirement when the new release is outside the
    # current range (e.g. a new rig-core minor like 0.39); leave in-range patch
    # releases alone to avoid churn.
    versioning-strategy: "increase-if-necessary"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions used in CI up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
