version: 2
updates:
  # Rust dependencies — surfaces new rig-core (and other) releases as PRs that CI
  # then validates for compatibility.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions used in CI up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
